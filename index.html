<!-- v2.0 简历筛选流水线 -->

<head>
<meta charset="UTF-8">

<title>资深门店导购 · 简历筛选流水线</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f5f5;color:#1a1a1a;line-height:1.6}
.container{max-width:1400px;margin:0 auto;padding:20px}

.top-bar{background:#fff;border-radius:12px;padding:20px 24px;margin-bottom:16px;border:1px solid #eee;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.top-bar h1{font-size:20px;font-weight:700}
.top-bar .meta{font-size:12px;color:#999}

.stats-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat{flex:1;min-width:120px;background:#fff;border-radius:10px;padding:16px;text-align:center;border:1px solid #eee}
.stat .n{font-size:30px;font-weight:800}
.stat .l{font-size:12px;color:#999;margin-top:4px}
.stat.pass .n{color:#27ae60}
.stat.fail .n{color:#e74c3c}
.stat.review .n{color:#f39c12}
.stat.total .n{color:#2b6de8}

.tabs{display:flex;gap:0;margin-bottom:0;background:#fff;border-radius:12px 12px 0 0;overflow:hidden;border:1px solid #eee;border-bottom:none}
.tab{padding:12px 20px;font-size:13px;cursor:pointer;border:none;background:transparent;color:#666;transition:all .2s;font-weight:500;border-bottom:2px solid transparent}
.tab:hover{color:#2b6de8}
.tab.active{color:#2b6de8;border-bottom-color:#2b6de8;font-weight:700}
.tab .badge{display:inline-block;margin-left:6px;padding:1px 7px;border-radius:10px;font-size:11px;background:#eee;color:#666}
.tab.active .badge{background:#e8f4fd;color:#2b6de8}

.panel{background:#fff;border:1px solid #eee;border-top:none;border-radius:0 0 12px 12px;padding:20px;margin-bottom:16px;min-height:400px}
.panel.hidden{display:none}

table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#fafafa;color:#666;font-weight:600;font-size:12px;padding:10px 10px;border-bottom:2px solid #eee;text-align:left;white-space:nowrap;position:sticky;top:0;z-index:1}
tbody td{padding:9px 10px;border-bottom:1px solid #f0f0f0}
tbody tr:hover{background:#fafcff}

.score-bar{display:inline-block;height:6px;border-radius:3px;background:#eee;vertical-align:middle;width:60px;margin-right:6px}
.score-bar .fill{height:100%;border-radius:3px}
.fill.high{background:#27ae60}.fill.mid{background:#f39c12}.fill.low{background:#e74c3c}

.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;margin:1px 2px}
.tag-pass{background:#e8f5e9;color:#27ae60}
.tag-fail{background:#fdecea;color:#e74c3c}
.tag-review{background:#fff8e1;color:#f39c12}
.tag-interview{background:#e8f4fd;color:#2b6de8}
.tag-pending{background:#f3e5f5;color:#9c27b0}
.tag-risk{background:#fdecea;color:#e74c3c}

.btn{padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#333;transition:all .2s}
.btn:hover{border-color:#aaa}
.btn-primary{background:#2b6de8;color:#fff;border-color:#2b6de8}
.btn-primary:hover{background:#1a5bd1}
.btn-sm{padding:3px 8px;font-size:11px}

.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.assess-card{background:#fff;border:1px solid #eee;border-radius:10px;padding:18px;position:relative}
.assess-card .name{font-size:16px;font-weight:700;margin-bottom:4px}
.assess-card .summary{font-size:12px;color:#999;margin-bottom:12px;display:flex;gap:12px;flex-wrap:wrap}
.assess-card .summary span{white-space:nowrap}
.assess-card .section-label{font-size:11px;color:#999;margin-bottom:4px;font-weight:600}
.assess-card .highlight{color:#27ae60;font-size:12px}
.assess-card .risk{color:#e74c3c;font-size:12px}
.assess-card .verdict{text-align:center;padding:8px;border-radius:6px;margin-top:12px;font-weight:700;font-size:13px}
.assess-card .rank-badge{position:absolute;top:12px;right:12px;font-size:22px;font-weight:800;color:#2b6de8;opacity:.3}

.funnel-section{margin-bottom:24px}
.funnel-section h3{font-size:14px;margin-bottom:12px;color:#1a1a1a}
.funnel-bar{display:flex;align-items:center;margin-bottom:8px;gap:12px}
.funnel-bar .label{width:100px;text-align:right;font-size:12px;color:#666}
.funnel-bar .bar-wrap{flex:1;height:32px;background:#f0f0f0;border-radius:6px;overflow:hidden;position:relative}
.funnel-bar .bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:12px;font-size:12px;color:#fff;font-weight:600;min-width:60px}
.funnel-bar .count{width:60px;font-size:13px;font-weight:600}

.suggestion-box{background:#fafafa;border:1px solid #eee;border-radius:8px;padding:16px;margin-top:12px}
.suggestion-box .item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0}
.suggestion-box .item:last-child{border-bottom:none}
.suggestion-box .change{font-weight:700}
.suggestion-box .change.up{color:#27ae60}.suggestion-box .change.down{color:#e74c3c}.suggestion-box .change.new{color:#2b6de8}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:999;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;padding:24px;width:600px;max-width:90vw;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal h3{margin-bottom:16px;font-size:16px}
.modal table{font-size:12px}
.modal table th,.modal table td{padding:6px 8px}

.filter-row{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.filter-row input,.filter-row select{padding:6px 12px;border:1px solid #ddd;border-radius:6px;font-size:12px;outline:none}
.filter-row input:focus{border-color:#2b6de8}

@media(max-width:768px){.card-grid{grid-template-columns:1fr}.tab{padding:10px 12px;font-size:11px}}
</style>
</head>

<div class="panel hidden" id="panel-cards">

// ═══════════════ 评分引擎 ═══════════════
function scoreCandidate(c) {
  let hardPass = true, hardScore = 0, hardMax = 0, hardDetails = [];
  let softScore = 0, softMax = 0, softDetails = [];
  let bonusScore = 0;
  let knockoutHit = [];

  // 硬性门槛
  CRITERIA_V1.hard.forEach(h => {
    hardMax += h.weight;
    let pass = true, reason = '';
    if (h.id === 'h1') {
      const eduLevel = {小学:0,初中:1,中专:2,高中:2,大专:3,本科:4,硕士:5};
      pass = eduLevel[c.edu] >= eduLevel[h.min.split('/')[0]];
      if (!pass) reason = `学历不达标：${c.edu} < ${h.min}`;
      hardScore += pass ? h.weight : 0;
    } else if (h.id === 'h2') {
      pass = c.expYears >= 3;
      if (!pass) reason = `零售经验不足：${c.expYears}年 < 3年`;
      hardScore += pass ? h.weight : 0;
    } else if (h.id === 'h3') {
      pass = c.industry !== '无';
      if (!pass) reason = `无零售行业背景`;
      hardScore += pass ? (c.industry.includes('服装')||c.industry.includes('美妆')||c.industry.includes('奢侈品')||c.industry.includes('珠宝') ? h.weight : h.weight*0.6) : 0;
    } else if (h.id === 'h4') {
      hardScore += h.weight;
      pass = true;
    } else if (h.id === 'h5') {
      const range = c.salary.match(/(\d+)-(\d+)/);
      if (range) {
        const avg = (parseInt(range[1])+parseInt(range[2]))/2;
        pass = avg >= 8 && avg <= 15;
        if (!pass) reason = `薪资范围不匹配`;
      }
      hardScore += pass ? h.weight : 0;
    }
    hardDetails.push({item:h.item,pass,reason});
    if (h.veto && !pass) hardPass = false;
  });

  // 淘汰项
  if (c.knockout && c.knockout.includes('频繁跳槽')) knockoutHit.push('近2年跳槽≥3次');
  if (c.edu === '小学') knockoutHit.push('学历过低');

  // 软性能力
  CRITERIA_V1.soft.forEach(s => {
    softMax += s.weight;
    softScore += (c.soft[s.id] || 2) * s.weight / 5;
  });

  // 加分
  bonusScore = c.bonus.length * 0.5;

  const totalScore = (hardScore/hardMax*100)*0.4 + (softScore/softMax*100)*0.4 + bonusScore*10*0.2;
  const hardRatio = hardScore / hardMax;
  const softRatio = softScore / softMax;

  let status = '面试', flag = [];
  if (!hardPass || knockoutHit.length > 0) status = '淘汰';
  else if (totalScore < 55) status = '待定';
  else if (totalScore < 65) status = '待定';

  if (c.hasGap && c.gap >= 3) flag.push({type:'工作断层',detail:`${c.gap}个月断层（${c.gapReason}）`,suggestion:'面试中核实断层原因及当前状态'});
  if (c.recentFreq >= 3) flag.push({type:'频繁跳槽',detail:`近2年跳槽${c.recentFreq}次`,suggestion:'面试中追问每次离职原因'});
  if (c.age > 40 && c.edu === '初中') flag.push({type:'综合风险',detail:'年龄偏大+学历偏低',suggestion:'评估体力与学习意愿'});

  return {
    ...c,
    hardPass, hardScore, hardMax, hardRatio, hardDetails,
    softScore, softMax, softRatio, softDetails: CRITERIA_V1.soft.map(s => ({item:s.item,score:c.soft[s.id]||2})),
    bonusScore, totalScore, status, flag, knockoutHit,
  };
}

// ═══════════════ 全局评分 ═══════════════
let scored = [];
function refreshAll() {
  scored = CANDIDATES.map(scoreCandidate);
  scored.sort((a,b) => b.totalScore - a.totalScore);
  renderAll();
}
refreshAll();

// ═══════════════ 渲染 ═══════════════
function renderAll() {
  renderRanking();
  renderEliminated();
  renderFlagged();
  renderCards();
  renderFunnel();
  updateStats();
}

function renderRanking(filter) {
  let data = scored;
  if (filter) {
    const s = document.getElementById('search-ranking').value.toLowerCase();
    const st = document.getElementById('filter-status').value;
    if (s) data = data.filter(c => c.name.includes(s) || c.id.toString().includes(s));
    if (st) data = data.filter(c => c.status === st);
  }
  const tbody = document.getElementById('tbody-ranking');
  tbody.innerHTML = data.slice(0, 20).map((c, i) => {
    const hardBar = `<div class="score-bar"><div class="fill ${c.hardRatio>=0.8?'high':c.hardRatio>=0.5?'mid':'low'}" style="width:${c.hardRatio*100}%"></div></div>${Math.round(c.hardRatio*100)}%`;
    const softBar = `<div class="score-bar"><div class="fill ${c.softRatio>=0.8?'high':c.softRatio>=0.5?'mid':'low'}" style="width:${c.softRatio*100}%"></div></div>${Math.round(c.softRatio*100)}%`;
    const statusTag = c.status==='面试'?'tag-interview':c.status==='待定'?'tag-pending':'tag-fail';
    let flags = '';
    if (c.hasGap && c.gap>=3) flags += '<span class="tag tag-risk" style="font-size:10px">断层</span> ';
    if (c.recentFreq>=3) flags += '<span class="tag tag-risk" style="font-size:10px">频跳</span> ';
    return `<tr onclick="showCardDetail(${c.id})" style="cursor:pointer" title="点击查看评估卡">
      <td><strong>#${i+1}</strong></td>
      <td><strong style="color:#2b6de8">${c.name}</strong></td>
      <td>${c.age}</td>
      <td>${c.expYears}年</td>
      <td>${c.edu}</td>
      <td>${c.industry}</td>
      <td><strong style="color:${c.totalScore>=70?'#27ae60':c.totalScore>=55?'#f39c12':'#e74c3c'}">${c.totalScore.toFixed(1)}</strong></td>
      <td>${hardBar}</td>
      <td>${softBar}</td>
      <td>+${c.bonusScore.toFixed(1)}</td>
      <td><span class="tag ${statusTag}">${c.status}</span></td>
      <td>${flags||'—'}</td>
    </tr>`;
  }).join('');
}

function filterRanking() { renderRanking(true); }

function renderEliminated() {
  const eliminated = scored.filter(c => c.status === '淘汰');
  document.getElementById('badge-elim').textContent = eliminated.length;
  document.getElementById('tbody-eliminated').innerHTML = eliminated.map(c => {
    let reasons = [];
    c.hardDetails.filter(d => !d.pass).forEach(d => reasons.push(d.reason));
    c.knockoutHit.forEach(k => reasons.push(k));
    return `<tr>
      <td><strong>${c.name}</strong></td>
      <td>${c.age}岁</td>
      <td>${c.expYears}年</td>
      <td style="color:#e74c3c;font-weight:600">${reasons.join('；')}</td>
      <td>${c.knockoutHit.length>0?c.knockoutHit.join('、'):'硬性门槛'}</td>
      <td>学历:${c.edu} | 行业:${c.industry} | 薪资:${c.salary}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="6" style="text-align:center;color:#999;padding:40px">🎉 无人淘汰</td></tr>';
}

function renderFlagged() {
  const flagged = scored.filter(c => c.flag.length > 0 && c.status !== '淘汰');
  document.getElementById('badge-flag').textContent = flagged.length;
  document.getElementById('tbody-flagged').innerHTML = flagged.map(c => {
    return c.flag.map(f => `<tr>
      <td><strong style="color:#f39c12">${c.name}</strong></td>
      <td>${c.expYears}年 | ${c.industry}</td>
      <td><span class="tag tag-review">${f.type}</span></td>
      <td>${f.detail}</td>
      <td>${f.suggestion}</td>
    </tr>`).join('');
  }).join('') || '<tr><td colspan="5" style="text-align:center;color:#999;padding:40px">✅ 无存疑项</td></tr>';
}

function renderCards() {
  const top20 = scored.filter(c => c.status !== '淘汰').slice(0, 20);
  document.getElementById('card-grid').innerHTML = top20.map((c, i) => {
    const verdictColor = c.status==='面试'?'#27ae60':c.status==='待定'?'#f39c12':'#e74c3c';
    const verdictBg = c.status==='面试'?'#e8f5e9':c.status==='待定'?'#fff8e1':'#fdecea';
    return `<div class="assess-card">
      <div class="rank-badge">#${i+1}</div>
      <div class="name">${c.name}</div>
      <div class="summary">
        <span>👤 ${c.age}岁</span><span>📚 ${c.edu}·${c.major}</span><span>💼 ${c.expYears}年</span>
        <span>🏪 ${c.industry}</span><span>💰 ${c.salary}</span>
      </div>
      <div class="section-label">🎯 匹配分：<strong style="color:${c.totalScore>=70?'#27ae60':'#f39c12'}">${c.totalScore.toFixed(1)}</strong></div>
      <div class="section-label" style="margin-top:8px">✨ 亮点</div>
      <div class="highlight">${c.bonus.length>0?c.bonus.map(b=>'✓ '+b).join('；'):'无特殊加分项'}${c.expYears>=8?'；经验丰富':''}${c.industry.includes('奢侈品')||c.industry.includes('美妆')?'；高端行业背景':''}</div>
      <div class="section-label" style="margin-top:8px">⚠️ 风险点</div>
      <div class="risk">${c.flag.length>0?c.flag.map(f=>f.detail).join('；'):'无明显风险'}</div>
      <div class="verdict" style="background:${verdictBg};color:${verdictColor}">${c.status==='面试'?'✅ 推荐面试':c.status==='待定'?'⏸️ 待定·建议HR复核':'❌ 淘汰'}</div>
    </div>`;
  }).join('');
}

function renderFunnel() {
  const total = scored.length;
  const pass = scored.filter(c => c.status === '面试').length;
  const eliminated = scored.filter(c => c.status === '淘汰').length;
  const pending = scored.filter(c => c.status === '待定').length;
  // 预估：面试转化率70%，录用率40%
  const estInterview = pass + Math.round(pending * 0.5);
  const estOffer = Math.round(estInterview * 0.4);
  const estOnboard = Math.round(estOffer * 0.85);

  const bars = [
    {label:'投递总数',count:total,color:'#2b6de8',width:100},
    {label:'通过初筛',count:pass+pending,color:'#27ae60',width:(pass+pending)/total*100},
    {label:'推荐面试',count:pass,color:'#27ae60',width:pass/total*100},
    {label:'预估进入面试',count:estInterview,color:'#f39c12',width:estInterview/total*100},
    {label:'预估发Offer',count:estOffer,color:'#9c27b0',width:estOffer/total*100},
    {label:'预估入职',count:estOnboard,color:'#2b6de8',width:estOnboard/total*100},
  ];

  document.getElementById('funnel-chart').innerHTML = bars.map(b => `
    <div class="funnel-bar">
      <div class="label">${b.label}</div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${Math.max(b.width,2)}%;background:${b.color}">${b.width.toFixed(1)}%</div></div>
      <div class="count">${b.count}人</div>
    </div>
  `).join('');

  // V2 权重建议
  const suggestions = [
    {item:'行业经验',current:'★★（可放宽）',suggested:'★★★（核心）',reason:`高匹配度候选人中${Math.round(scored.filter(c=>c.totalScore>=65&&(c.industry.includes('服装')||c.industry.includes('美妆')||c.industry.includes('奢侈品')).length/scored.filter(c=>c.totalScore>=65).length*100)}%有同品类行业经验`,change:'up'},
    {item:'学习能力',current:'★（参考）',suggested:'★★（重要）',reason:'跨行业候选人需快速掌握产品知识，学习能力直接影响上手速度',change:'up'},
    {item:'服务意识',current:'★★（重要）',suggested:'★★★（核心）',reason:`淘汰候选人中${scored.filter(c=>c.status==='淘汰'&&c.soft.s3<=2).length}人因服务意识低被淘汰`,change:'up'},
    {item:'证书资质',current:'★（参考）',suggested:'★（参考）',reason:'保持，候选人中持有相关证书比例较低，强制要求会压缩人才池',change:'same'},
    {item:'新增: 稳定性评估',current:'—',suggested:'★★（重要）',reason:`本次筛选${scored.filter(c=>c.hasGap||c.recentFreq>=3).length}人有断层或频跳风险，建议纳入软性评估`,change:'new'},
  ];

  document.getElementById('v2-suggestions').innerHTML = suggestions.map(s => `
    <div class="suggestion-box" style="margin-bottom:8px">
      <div class="item">
        <span><strong>${s.item}</strong></span>
        <span style="font-size:12px;color:#999">${s.current} → </span>
        <span class="change ${s.change}">${s.suggested}</span>
      </div>
      <div style="font-size:12px;color:#666;padding:4px 0">📊 ${s.reason}</div>
    </div>
  `).join('');
}

function updateStats() {
  document.getElementById('stat-total').textContent = scored.length;
  document.getElementById('stat-pass').textContent = scored.filter(c => c.status === '面试').length;
  document.getElementById('stat-fail').textContent = scored.filter(c => c.status === '淘汰').length;
  document.getElementById('stat-review').textContent = scored.filter(c => c.flag.length > 0 && c.status !== '淘汰').length;
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
  var tab = document.querySelector('[data-tab="' + name + '"]');
  if (tab) tab.classList.add('active');
  var panel = document.getElementById('panel-' + name);
  if (panel) panel.classList.remove('hidden');
}

function showCardDetail(id) {
  const c = scored.find(s => s.id === id);
  if (!c) return;
  let hardHtml = c.hardDetails.map(d => `<tr><td>${d.item}</td><td style="color:${d.pass?'#27ae60':'#e74c3c'}">${d.pass?'✅ 通过':'❌ '+d.reason}</td></tr>`).join('');
  let softHtml = c.softDetails.map(d => `<tr><td>${d.item}</td><td>${'★'.repeat(d.score)}${'☆'.repeat(5-d.score)} ${d.score}/5</td></tr>`).join('');
  document.getElementById('modal-container').innerHTML = `<div class="modal-overlay" onclick="this.remove()"><div class="modal" onclick="event.stopPropagation()">
    <h3>${c.name} · 评估卡详情</h3>
    <p style="font-size:12px;color:#666;margin-bottom:12px">${c.age}岁 | ${c.edu}·${c.major} | ${c.expYears}年 | ${c.industry} | ${c.lastCompany} | ${c.salary}</p>
    <h4 style="font-size:13px;margin:12px 0 6px">硬性门槛</h4><table style="width:100%"><tbody>${hardHtml}</tbody></table>
    <h4 style="font-size:13px;margin:12px 0 6px">软性能力</h4><table style="width:100%"><tbody>${softHtml}</tbody></table>
    <h4 style="font-size:13px;margin:12px 0 6px">加分项</h4><p style="font-size:12px">${c.bonus.length>0?c.bonus.join('、'):'无'} (+${c.bonusScore.toFixed(1)}分)</p>
    <h4 style="font-size:13px;margin:12px 0 6px">风险标记</h4><p style="font-size:12px;color:#e74c3c">${c.flag.length>0?c.flag.map(f=>f.detail).join('；'):'无'}</p>
    <div style="text-align:center;margin-top:16px;font-size:16px;font-weight:700;color:${c.totalScore>=70?'#27ae60':'#f39c12'}">总分：${c.totalScore.toFixed(1)} | ${c.status==='面试'?'✅ 推荐面试':c.status==='待定'?'⏸️ 待定':'❌ 淘汰'}</div>
  </div></div>`;
}

function showModal(type) {
  if (type === 'criteria') {
    let html = '';
    html += '<h4 style="font-size:13px;margin:8px 0">硬性门槛</h4><table style="width:100%"><thead><tr><th>项目</th><th>最低要求</th><th>理想标准</th><th>权重</th><th>一票否决</th></tr></thead><tbody>';
    CRITERIA_V1.hard.forEach(h => html += `<tr><td>${h.item}</td><td>${h.min}</td><td>${h.ideal}</td><td>${'★'.repeat(h.weight)}</td><td>${h.veto?'✅':'🔲'}</td></tr>`);
    html += '</tbody></table><h4 style="font-size:13px;margin:12px 0 6px">软性能力</h4><table style="width:100%"><thead><tr><th>项目</th><th>权重</th></tr></thead><tbody>';
    CRITERIA_V1.soft.forEach(s => html += `<tr><td>${s.item}</td><td>${'★'.repeat(s.weight)}</td></tr>`);
    html += '</tbody></table><h4 style="font-size:13px;margin:12px 0 6px">淘汰项</h4><ul style="font-size:12px;padding-left:18px">';
    CRITERIA_V1.knockout.forEach(k => html += `<li>${k.item}：${k.rule}</li>`);
    html += '</ul>';
    document.getElementById('modal-container').innerHTML = `<div class="modal-overlay" onclick="this.remove()"><div class="modal" onclick="event.stopPropagation()"><h3>筛选标准 V1</h3>${html}</div></div>`;
  }
}
